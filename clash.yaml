# Clash YAML 配置 - 基于 ACL4SSR 修改
# 规则来源: https://github.com/ACL4SSR/ACL4SSR

proxy-groups:
  # 🔀 全部CF节点 - 自动选择
  - name: 🔀 全部节点
    type: url-test
    proxies:
      - SELECT
    url: "http://www.gstatic.com/generate_204"
    interval: 300

  # 🇯🇵 日本节点 - 用于需要干净IP的网站
  - name: 🇯🇵 日本节点
    type: select
    proxies:
      - JP[Hysteria2]
      - 🔀 全部节点

  # 📺 流媒体 - 全部节点自动选
  - name: 📺 流媒体
    type: url-test
    proxies:
      - 🔀 全部节点
    url: "http://www.gstatic.com/generate_204"

  # 📱 Telegram - 全部节点
  - name: 📱 Telegram
    type: url-test
    proxies:
      - 🔀 全部节点
    url: "http://www.gstatic.com/generate_204"

  # 🤖 AI服务 - 日本节点
  - name: 🤖 AI服务
    type: select
    proxies:
      - 🇯🇵 日本节点

  # 🍎 苹果服务 - 直连
  - name: 🍎 苹果服务
    type: select
    proxies:
      - DIRECT
      - 🔀 全部节点

  # 🔔 谷歌FCM/服务 - 日本节点
  - name: 🔔 谷歌服务
    type: select
    proxies:
      - 🇯🇵 日本节点
      - 🔀 全部节点

# 规则
